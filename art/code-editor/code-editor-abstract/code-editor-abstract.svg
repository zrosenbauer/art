<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 420" width="660" height="420">
  <defs>
    <clipPath id="code-editor-abstract-clip">
      <rect x="0" y="0" width="660" height="420" rx="10"/>
    </clipPath>
  </defs>

  <!-- IDE Window (outer shell, slightly inset to avoid stroke clipping) -->
  <rect x="0.75" y="0.75" width="658.5" height="418.5" rx="10" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="660" height="36" rx="10" fill="#2a2a2a"/>
  <rect x="0" y="26" width="660" height="10" fill="#2a2a2a"/>

  <!-- Traffic lights -->
  <circle cx="28" cy="18" r="7" fill="#ef4444"/>
  <circle cx="50" cy="18" r="7" fill="#f59e0b"/>
  <circle cx="72" cy="18" r="7" fill="#10b981"/>

  <!-- Inner content clipped to rounded shell -->
  <g clip-path="url(#code-editor-abstract-clip)">
    <!-- Sidebar -->
    <rect x="0" y="36" width="80" height="384" fill="#111111"/>
    <!-- Sidebar file icons -->
    <rect x="16" y="52" width="28" height="3" rx="1" fill="#505050" opacity="0.4"/>
    <rect x="16" y="62" width="22" height="3" rx="1" fill="#505050" opacity="0.3"/>
    <rect x="16" y="72" width="26" height="3" rx="1" fill="#7268F0" opacity="0.5"/>
    <rect x="16" y="82" width="20" height="3" rx="1" fill="#505050" opacity="0.3"/>
    <rect x="16" y="92" width="24" height="3" rx="1" fill="#505050" opacity="0.25"/>
    <rect x="16" y="102" width="18" height="3" rx="1" fill="#505050" opacity="0.2"/>
    <rect x="16" y="112" width="28" height="3" rx="1" fill="#505050" opacity="0.25"/>
    <rect x="16" y="122" width="22" height="3" rx="1" fill="#505050" opacity="0.2"/>

    <!-- Editor area -->
    <rect x="80" y="36" width="580" height="384" fill="#0a0a0a"/>

    <!-- Code lines — colored bars like the reference image -->
    <!-- Line 1: keyword + function name + bracket -->
    <rect x="88" y="54" width="28" height="5" rx="2" fill="#ef4444" opacity="0.8"/>
    <rect x="122" y="54" width="60" height="5" rx="2" fill="#EEFF41" opacity="0.7"/>
    <rect x="188" y="54" width="18" height="5" rx="2" fill="#0097A7" opacity="0.7"/>

    <!-- Line 2: blank / comment -->

    <!-- Line 3: indented keyword + value -->
    <rect x="108" y="90" width="22" height="5" rx="2" fill="#ef4444" opacity="0.7"/>
    <rect x="136" y="90" width="100" height="5" rx="2" fill="#EEFF41" opacity="0.65"/>

    <!-- Line 4: indented long line -->
    <rect x="108" y="108" width="18" height="5" rx="2" fill="#9ca3af" opacity="0.4"/>
    <rect x="132" y="108" width="160" height="5" rx="2" fill="#EEFF41" opacity="0.6"/>

    <!-- Line 5: indented assignment -->
    <rect x="128" y="126" width="30" height="5" rx="2" fill="#EEFF41" opacity="0.65"/>
    <rect x="164" y="126" width="14" height="5" rx="2" fill="#9ca3af" opacity="0.4"/>
    <rect x="184" y="126" width="120" height="5" rx="2" fill="#EEFF41" opacity="0.55"/>

    <!-- Line 6: indented long expression -->
    <rect x="128" y="144" width="180" height="5" rx="2" fill="#EEFF41" opacity="0.6"/>

    <!-- Line 7: indented call -->
    <rect x="128" y="162" width="24" height="5" rx="2" fill="#7268F0" opacity="0.6"/>
    <rect x="158" y="162" width="140" height="5" rx="2" fill="#EEFF41" opacity="0.55"/>

    <!-- Line 8: blank -->

    <!-- Line 9: less indented -->
    <rect x="108" y="198" width="20" height="5" rx="2" fill="#ef4444" opacity="0.7"/>
    <rect x="134" y="198" width="80" height="5" rx="2" fill="#EEFF41" opacity="0.6"/>

    <!-- Line 10: indented -->
    <rect x="128" y="216" width="140" height="5" rx="2" fill="#EEFF41" opacity="0.55"/>
    <rect x="274" y="216" width="30" height="5" rx="2" fill="#0097A7" opacity="0.5"/>

    <!-- Line 11: indented -->
    <rect x="128" y="234" width="100" height="5" rx="2" fill="#EEFF41" opacity="0.6"/>

    <!-- Line 12: indented shorter -->
    <rect x="128" y="252" width="60" height="5" rx="2" fill="#EEFF41" opacity="0.5"/>
    <rect x="194" y="252" width="40" height="5" rx="2" fill="#7268F0" opacity="0.5"/>

    <!-- Line 13: blank -->

    <!-- Line 14: dedented keyword -->
    <rect x="108" y="288" width="28" height="5" rx="2" fill="#ef4444" opacity="0.7"/>
    <rect x="142" y="288" width="50" height="5" rx="2" fill="#EEFF41" opacity="0.6"/>

    <!-- Line 15: indented -->
    <rect x="128" y="306" width="90" height="5" rx="2" fill="#EEFF41" opacity="0.55"/>

    <!-- Line 16: indented -->
    <rect x="128" y="324" width="70" height="5" rx="2" fill="#EEFF41" opacity="0.5"/>

    <!-- Line 17: blank -->

    <!-- Line 18: closing -->
    <rect x="88" y="360" width="14" height="5" rx="2" fill="#9ca3af" opacity="0.4"/>

    <!-- Line 19: blank -->

    <!-- Line 20: new block -->
    <rect x="88" y="396" width="28" height="5" rx="2" fill="#ef4444" opacity="0.6"/>
    <rect x="122" y="396" width="45" height="5" rx="2" fill="#EEFF41" opacity="0.5"/>
  </g>
</svg>
