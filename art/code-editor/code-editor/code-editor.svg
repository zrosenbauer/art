      <text x="36" y="114" fill="#737373">▾ forms</text>
      <text x="52" y="132" fill="#525252">Card.tsx</text>
      <!-- active file row -->
      <rect x="0" y="140" width="120" height="18" fill="#7268F0" opacity="0.18"/>
      <rect x="0" y="140" width="2" height="18" fill="#7268F0"/>
      <text x="52" y="154" fill="#e5e5e5">Button.tsx</text>
      <text x="52" y="172" fill="#525252">Input.tsx</text>
      <text x="52" y="190" fill="#525252">Select.tsx</text>
      <text x="36" y="208" fill="#737373">▸ layout</text>
      <text x="26" y="226" fill="#737373">  package.json</text>
      <text x="16" y="244" fill="#737373">▾ hooks</text>
      <text x="26" y="262" fill="#737373">▸ src</text>
      <text x="26" y="280" fill="#737373">  package.json</text>
      <text x="16" y="298" fill="#737373">▾ tests</text>
      <text x="26" y="316" fill="#737373">▸ unit</text>
      <text x="26" y="334" fill="#737373">▸ integration</text>
