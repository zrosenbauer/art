    <!-- Tab bar -->
    <rect x="120" y="36" width="540" height="26" fill="#0e0e0e"/>
    <rect x="120" y="36" width="110" height="26" fill="#0a0a0a"/>
    <rect x="120" y="36" width="110" height="2" fill="#7268F0"/>
    <text x="136" y="53" font-family="'Geist Mono', monospace" font-size="10" fill="#e5e5e5">Button.tsx</text>
    <text x="218" y="53" font-family="'Geist Mono', monospace" font-size="10" fill="#737373">×</text>

    <!-- Line numbers gutter -->
    <rect x="120" y="62" width="34" height="358" fill="#0e0e0e"/>
    <g fill="#3f3f3f" font-family="'Geist Mono', monospace" font-size="10">
