      <!-- Line 1: import { useState } from 'react' -->
      <text x="162" y="80"><tspan fill="#c084fc">import</tspan><tspan fill="#e5e5e5"> { </tspan><tspan fill="#0097A7">useState</tspan><tspan fill="#e5e5e5"> } </tspan><tspan fill="#c084fc">from</tspan><tspan fill="#e5e5e5"> </tspan><tspan fill="#a3e635">'react'</tspan></text>

      <!-- Line 2: import { cn } from './utils' -->
      <text x="162" y="96"><tspan fill="#c084fc">import</tspan><tspan fill="#e5e5e5"> { </tspan><tspan fill="#0097A7">cn</tspan><tspan fill="#e5e5e5"> } </tspan><tspan fill="#c084fc">from</tspan><tspan fill="#e5e5e5"> </tspan><tspan fill="#a3e635">'./utils'</tspan></text>

      <!-- Line 3: blank -->

      <!-- Line 4: interface Props { -->
      <text x="162" y="128"><tspan fill="#c084fc">interface</tspan><tspan fill="#22d3ee"> Props</tspan><tspan fill="#9ca3af"> {</tspan></text>

      <!-- Line 5:   label: string -->
      <text x="176" y="144"><tspan fill="#60a5fa">label</tspan><tspan fill="#9ca3af">: </tspan><tspan fill="#22d3ee">string</tspan></text>

      <!-- Line 6:   variant?: 'primary' | 'secondary' -->
      <text x="176" y="160"><tspan fill="#60a5fa">variant</tspan><tspan fill="#9ca3af">?: </tspan><tspan fill="#a3e635">'primary'</tspan><tspan fill="#9ca3af"> | </tspan><tspan fill="#a3e635">'secondary'</tspan></text>

      <!-- Line 7: } -->
      <text x="162" y="176"><tspan fill="#9ca3af">}</tspan></text>

      <!-- Line 8: blank -->

      <!-- Line 9: export function Button(props: Props) { -->
      <text x="162" y="208"><tspan fill="#c084fc">export</tspan><tspan fill="#e5e5e5"> </tspan><tspan fill="#c084fc">function</tspan><tspan fill="#e5e5e5"> </tspan><tspan fill="#0097A7">Button</tspan><tspan fill="#9ca3af">(</tspan><tspan fill="#60a5fa">props</tspan><tspan fill="#9ca3af">: </tspan><tspan fill="#22d3ee">Props</tspan><tspan fill="#9ca3af">) {</tspan></text>

      <!-- Line 10:   const [hovered, setHovered] = useState(false) -->
      <text x="176" y="224"><tspan fill="#c084fc">const</tspan><tspan fill="#9ca3af"> [</tspan><tspan fill="#60a5fa">hovered</tspan><tspan fill="#9ca3af">, </tspan><tspan fill="#60a5fa">setHovered</tspan><tspan fill="#9ca3af">] = </tspan><tspan fill="#0097A7">useState</tspan><tspan fill="#9ca3af">(</tspan><tspan fill="#c084fc">false</tspan><tspan fill="#9ca3af">)</tspan></text>

      <!-- Line 11:   const classes = cn('btn', props.variant) -->
      <text x="176" y="240"><tspan fill="#c084fc">const</tspan><tspan fill="#e5e5e5"> </tspan><tspan fill="#60a5fa">classes</tspan><tspan fill="#9ca3af"> = </tspan><tspan fill="#0097A7">cn</tspan><tspan fill="#9ca3af">(</tspan><tspan fill="#a3e635">'btn'</tspan><tspan fill="#9ca3af">, </tspan><tspan fill="#60a5fa">props</tspan><tspan fill="#9ca3af">.</tspan><tspan fill="#60a5fa">variant</tspan><tspan fill="#9ca3af">)</tspan></text>

      <!-- Line 12: blank -->

      <!-- Line 13:   return ( -->
      <text x="176" y="272"><tspan fill="#c084fc">return</tspan><tspan fill="#9ca3af"> (</tspan></text>

      <!-- Line 14:     <button -->
      <text x="190" y="288"><tspan fill="#9ca3af">&lt;</tspan><tspan fill="#ef4444">button</tspan></text>

      <!-- Line 15:       className={classes} -->
      <text x="204" y="304"><tspan fill="#EEFF41">className</tspan><tspan fill="#9ca3af">={</tspan><tspan fill="#60a5fa">classes</tspan><tspan fill="#9ca3af">}</tspan></text>

      <!-- Line 16:       onMouseEnter={() => setHovered(true)} -->
      <text x="204" y="320"><tspan fill="#EEFF41">onMouseEnter</tspan><tspan fill="#9ca3af">={() =&gt; </tspan><tspan fill="#0097A7">setHovered</tspan><tspan fill="#9ca3af">(</tspan><tspan fill="#c084fc">true</tspan><tspan fill="#9ca3af">)}</tspan></text>

      <!-- Line 17:       onMouseLeave={() => setHovered(false)} -->
      <text x="204" y="336"><tspan fill="#EEFF41">onMouseLeave</tspan><tspan fill="#9ca3af">={() =&gt; </tspan><tspan fill="#0097A7">setHovered</tspan><tspan fill="#9ca3af">(</tspan><tspan fill="#c084fc">false</tspan><tspan fill="#9ca3af">)}</tspan></text>

      <!-- Line 18:     > -->
      <text x="190" y="352"><tspan fill="#9ca3af">&gt;</tspan></text>

      <!-- Line 19:       {props.label} -->
      <text x="204" y="368"><tspan fill="#9ca3af">{</tspan><tspan fill="#60a5fa">props</tspan><tspan fill="#9ca3af">.</tspan><tspan fill="#60a5fa">label</tspan><tspan fill="#9ca3af">}</tspan></text>

      <!-- Line 20:     </button> -->
      <text x="190" y="384"><tspan fill="#9ca3af">&lt;/</tspan><tspan fill="#ef4444">button</tspan><tspan fill="#9ca3af">&gt;</tspan></text>
    </g>
  </g>
