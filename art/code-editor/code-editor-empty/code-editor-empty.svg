<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 420" width="660" height="420">
  <defs>
    <clipPath id="code-editor-clip">
      <rect x="0" y="0" width="660" height="420" rx="10"/>
    </clipPath>
  </defs>

  <!-- IDE Window (outer shell, slightly inset to avoid stroke clipping) -->
  <rect x="0.75" y="0.75" width="658.5" height="418.5" rx="10" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="660" height="36" rx="10" fill="#2a2a2a"/>
  <rect x="0" y="26" width="660" height="10" fill="#2a2a2a"/>

  <!-- Traffic lights -->
  <circle cx="28" cy="18" r="7" fill="#ef4444"/>
  <circle cx="50" cy="18" r="7" fill="#f59e0b"/>
  <circle cx="72" cy="18" r="7" fill="#10b981"/>

  <!-- File tab in title bar -->
  <text x="330" y="22" text-anchor="middle" font-family="'Geist Mono', monospace" font-size="11" fill="#737373">Button.tsx — my-app</text>

  <!-- Inner content clipped to rounded shell -->
  <g clip-path="url(#code-editor-clip)">
    <!-- Sidebar -->
    <rect x="0" y="36" width="120" height="384" fill="#111111"/>

    <!-- Sidebar tree -->
    <g font-family="'Geist Mono', monospace" font-size="10" xml:space="preserve">
      <text x="16" y="60" fill="#737373">▾ src</text>
      <text x="26" y="78" fill="#737373">▾ components</text>
      <text x="36" y="96" fill="#737373">▸ ui</text>
      <text x="36" y="114" fill="#737373">▾ forms</text>
      <text x="52" y="132" fill="#525252">Card.tsx</text>
      <!-- active file row -->
      <rect x="0" y="140" width="120" height="18" fill="#7268F0" opacity="0.18"/>
      <rect x="0" y="140" width="2" height="18" fill="#7268F0"/>
      <text x="52" y="154" fill="#e5e5e5">Button.tsx</text>
      <text x="52" y="172" fill="#525252">Input.tsx</text>
      <text x="52" y="190" fill="#525252">Select.tsx</text>
      <text x="36" y="208" fill="#737373">▸ layout</text>
      <text x="26" y="226" fill="#737373">  package.json</text>
      <text x="16" y="244" fill="#737373">▾ hooks</text>
      <text x="26" y="262" fill="#737373">▸ src</text>
      <text x="26" y="280" fill="#737373">  package.json</text>
      <text x="16" y="298" fill="#737373">▾ tests</text>
      <text x="26" y="316" fill="#737373">▸ unit</text>
      <text x="26" y="334" fill="#737373">▸ integration</text>
    </g>

    <!-- Editor area -->
    <rect x="120" y="36" width="540" height="384" fill="#0a0a0a"/>

    <!-- Tab bar -->
    <rect x="120" y="36" width="540" height="26" fill="#0e0e0e"/>
    <rect x="120" y="36" width="110" height="26" fill="#0a0a0a"/>
    <rect x="120" y="36" width="110" height="2" fill="#7268F0"/>
    <text x="136" y="53" font-family="'Geist Mono', monospace" font-size="10" fill="#e5e5e5">Button.tsx</text>
    <text x="218" y="53" font-family="'Geist Mono', monospace" font-size="10" fill="#737373">×</text>
  </g>
</svg>
